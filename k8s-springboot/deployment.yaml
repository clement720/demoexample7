apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-demo
  namespace: springboot-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: springboot-demo
  template:
    metadata:
      labels:
        app: springboot-demo
    spec:
      containers:
        - name: springboot-demo
          image: demoexample:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
