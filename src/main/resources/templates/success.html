<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home Page</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial;
            background: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            text-align: center;
            box-shadow: 0 0 10px #ccc;
        }

        h1 {
            color: green;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Login Successful</h1>
    <p th:text="${message}"></p>
</div>

</body>
</html>
